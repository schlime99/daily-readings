name: Daily Catholic Readings Email

# Runs automatically in GitHub's cloud — your computer does NOT need to be on.
on:
  schedule:
    # Times are in UTC. 12:00 UTC = 6:00 AM Mountain (Albuquerque, MDT/summer).
    # In winter (MST) this becomes 5:00 AM local. Adjust the number if you like:
    #   - "0 13 * * *"  ->  6:00 AM Mountain Standard Time (winter)
    - cron: "0 12 * * *"
  workflow_dispatch:        # lets you also trigger it manually from the Actions tab

jobs:
  send-readings:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests beautifulsoup4

      - name: Send the daily readings email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_readings_email.py
